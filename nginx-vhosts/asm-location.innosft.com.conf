server {
    listen 80;
    server_name asm-location.innosft.com;
    # Certbot redirigera vers HTTPS automatiquement
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name asm-location.innosft.com;

    # Certificats SSL (générés par certbot)
    ssl_certificate     /etc/letsencrypt/live/asm-location.innosft.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/asm-location.innosft.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Proxy vers le conteneur frontend
    location / {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
