server {
    listen 80;
    server_name asm-api.innosft.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name asm-api.innosft.com;

    # Certificats SSL (générés par certbot)
    ssl_certificate     /etc/letsencrypt/live/asm-api.innosft.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/asm-api.innosft.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Taille max upload (images véhicules, contrats)
    client_max_body_size 20M;

    # Proxy vers le conteneur backend
    location / {
        proxy_pass         http://127.0.0.1:5001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }
}
